name: Tests

# Se déclenche sur chaque push et chaque pull request ciblant main/master —
# les deux noms de branche par défaut possibles selon comment le dépôt a été
# initialisé, pour ne pas dépendre d'un choix particulier.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests unitaires + build
    runs-on: ubuntu-latest

    # Le projet npm (package.json) vit dans career-web-react/, pas à la racine
    # du dépôt GitHub (Career-App/career-web-react/package.json) : ce défaut
    # s'applique à tous les steps "run" ci-dessous (mais pas aux steps "uses",
    # d'où les chemins explicites plus bas pour le cache et les artefacts).
    defaults:
      run:
        working-directory: career-web-react

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: career-web-react/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer la suite de tests (vitest)
        run: npm test

      - name: Générer le rapport de couverture
        run: npm run test:coverage

      - name: Vérifier que le build frontend passe
        run: npm run build

      # Le rapport de couverture est publié comme artefact plutôt que bloquant :
      # aucun seuil minimal n'est configuré dans vitest.config.js à ce stade
      # (cf. mémoire §4.2.3 — la suite de tests reste volontairement ciblée sur
      # la logique métier extraite, pas sur l'ensemble de l'application).
      - name: Publier le rapport de couverture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: career-web-react/coverage/
          retention-days: 14